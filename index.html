<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

    <div class="overlay">
        <img src="./assets/tube-spinner.svg" alt="Spinner" />
    </div>

    <div id="wrapper">
        <header>
            <h1>Gabriel Forecasts⛅</h1>
            <h4>Dashboard</h4>
        </header>
        <div class="name">
            <span>Simple Weather Tracker</span>
            <div class="blink"></div>
        </div>
        <p class="date">
            <span class="date-left"></span>
            <span class="time-right"></span>
        </p>
        <div class="input-wrapper">
            <input type="text" id="city-input" placeholder="Enter Location">
            <button type="button" id="search">Search
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
            <div class="error-reply"></div>
        </div>
        <div class="values">
            <div class="value temp">
                <span class="type">Temperature</span>
                <i class="fa-solid fa-temperature-half"></i>
                <hr />
                <span class="weather_state">
                    <i></i> &ensp;<span class="text"></span>
                </span>
                <div class="main-value"></div>
                <div class="feels-like"></div>
            </div>
            <div class="value humi">
                <span class="type">Humidity</span>
                <i class="fa-solid fa-droplet"></i>
                <hr />
                <div class="main-value"></div>
                <div class="feels-like"></div>
            </div>
            <div class="value wind">
                <span class="type">Wind Speed</span>
                <i class="fa-solid fa-wind"></i>
                <hr />
                <div class="main-value"></div>
                <div class="feels-like"></div>
            </div>
        </div>
        <footer>
            &copy; Gabriel Dodowei
            <span id="year"></span>
            <script>
                document.getElementById("year").textContent = new Date().getFullYear();
            </script>
        </footer>
    </div>
    <script src="./script.js" type="module"></script>
</body>

</html>
